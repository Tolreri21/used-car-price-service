<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Carpy</title>
    <link rel="stylesheet" href="/static/style.css">

</head>
<body>

<nav class="navbar">
    <div class="nav-inner">
        <a href="/" class="nav-brand">Carpy</a>
        <div class="nav-links">
            <a href="/">Home</a>
            <a href="/app">Predict</a>
        </div>
    </div>
</nav>

<div class = "container">
<h1>Prediction page</h1>

<form id = "predict-form">

    <div class = "field">
        <label for="make_year">Make year</label>
        <input type="number" id = "make_year" name = "make_year" required>
    </div>

    <div class = "field">
        <label for="engine_cc">Engine cubic centimeters</label>
        <input type="number" id = "engine_cc" name="engine_cc" required>
    </div>

    <div class = "field">
        <label for="owner_count">Owner count</label>
        <input type="number" id="owner_count" name="owner_count" required>
    </div>

    <div class = "field">
        <label for="accidents_reported">Accidents reported</label>
        <input type="number" id="accidents_reported" name="accidents_reported" required>
    </div>

    <div class = "field">
        <label for="mileage_kmpl">Mileage kmpl</label>
        <input type="number" step="0.1" id="mileage_kmpl" name="mileage_kmpl" required>
    </div>

    <div class = "field">
        <label for="fuel_type">Fuel type</label>
        <input type="text" id="fuel_type" name="fuel_type" required>
    </div>

    <div class = "field">
        <label for="brand">Brand</label>
        <input type="text" id="brand" name="brand" required>
    </div>

    <div class = "field">
        <label for="transmission">Transmission</label>
        <input type="text" id="transmission" name="transmission" required>
    </div>

    <div class = "field">
        <label for="color">Color</label>
        <input type="text" id="color" name="color" required>
    </div>

    <div class = "field">
        <label for="service_history">Service history</label>
        <input type="text" id="service_history" name="service_history" required>
    </div>

    <div class = "field">
        <label for="insurance_valid">Insurance is valid</label>
        <input type="text" id="insurance_valid" name="insurance_valid" required>
    </div>

    <button type="submit">Predict</button>
</form>

<h2>Result of the prediction</h2>
<p id = "result"></p>
</div>


<script src="/static/app.js"></script>
</body>
</html>
