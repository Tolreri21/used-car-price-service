<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carpy — price your car</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<nav class="navbar">
    <div class="nav-inner">
        <a href="/" class="nav-brand">Carpy</a>
        <div class="nav-links">
            <a href="/">Home</a>
            <a href="/app">Predict</a>
        </div>
    </div>
</nav>

<div class="container">
    <div class="page-head">
        <p class="eyebrow">Price estimate</p>
        <h1>Price your car</h1>
        <p>Fill in the details below — the more accurate the inputs, the sharper the estimate.</p>
    </div>

    <form id="predict-form">
        <fieldset>
            <legend>Basics</legend>
            <div class="grid">
                <div class="field">
                    <label for="brand">Brand</label>
                    <select id="brand" name="brand" required>
                        <option value="" disabled selected>—</option>
                        <option value="BMW">BMW</option>
                        <option value="Chevrolet">Chevrolet</option>
                        <option value="Ford">Ford</option>
                        <option value="Honda">Honda</option>
                        <option value="Hyundai">Hyundai</option>
                        <option value="Kia">Kia</option>
                        <option value="Nissan">Nissan</option>
                        <option value="Tesla">Tesla</option>
                        <option value="Toyota">Toyota</option>
                        <option value="Volkswagen">Volkswagen</option>
                    </select>
                </div>
                <div class="field">
                    <label for="make_year">Make year</label>
                    <input type="number" id="make_year" name="make_year" min="1995" placeholder="e.g. 2018" required>
                </div>
                <div class="field">
                    <label for="color">Color</label>
                    <select id="color" name="color" required>
                        <option value="" disabled selected>—</option>
                        <option value="Black">Black</option>
                        <option value="Blue">Blue</option>
                        <option value="Gray">Gray</option>
                        <option value="Red">Red</option>
                        <option value="Silver">Silver</option>
                        <option value="White">White</option>
                    </select>
                </div>
            </div>
        </fieldset>

        <fieldset>
            <legend>Engine &amp; drivetrain</legend>
            <div class="grid">
                <div class="field">
                    <label for="fuel_type">Fuel type</label>
                    <select id="fuel_type" name="fuel_type" required>
                        <option value="" disabled selected>—</option>
                        <option value="Diesel">Diesel</option>
                        <option value="Electric">Electric</option>
                        <option value="Petrol">Petrol</option>
                    </select>
                </div>
                <div class="field">
                    <label for="engine_cc">Engine size (cc)</label>
                    <input type="number" id="engine_cc" name="engine_cc" min="800" max="5000" placeholder="800–5000" required>
                </div>
                <div class="field">
                    <label for="transmission">Transmission</label>
                    <select id="transmission" name="transmission" required>
                        <option value="" disabled selected>—</option>
                        <option value="Automatic">Automatic</option>
                        <option value="Manual">Manual</option>
                    </select>
                </div>
                <div class="field">
                    <label for="mileage_kmpl">Fuel economy (km/l)</label>
                    <input type="number" id="mileage_kmpl" name="mileage_kmpl" min="5" max="35" step="0.1" placeholder="5–35" required>
                </div>
            </div>
        </fieldset>

        <fieldset>
            <legend>History &amp; condition</legend>
            <div class="grid">
                <div class="field">
                    <label for="owner_count">Previous owners</label>
                    <input type="number" id="owner_count" name="owner_count" min="1" max="5" placeholder="1–5" required>
                </div>
                <div class="field">
                    <label for="accidents_reported">Accidents reported</label>
                    <input type="number" id="accidents_reported" name="accidents_reported" min="0" max="5" placeholder="0–5" required>
                </div>
                <div class="field">
                    <label for="service_history">Service history</label>
                    <select id="service_history" name="service_history" required>
                        <option value="" disabled selected>—</option>
                        <option value="Full">Full</option>
                        <option value="Partial">Partial</option>
                        <option value="Unknown">Unknown</option>
                    </select>
                </div>
                <div class="field">
                    <label for="insurance_valid">Insurance valid</label>
                    <select id="insurance_valid" name="insurance_valid" required>
                        <option value="" disabled selected>—</option>
                        <option value="Yes">Yes</option>
                        <option value="No">No</option>
                    </select>
                </div>
            </div>
        </fieldset>

        <button type="submit" class="btn">Predict price</button>
    </form>

    <div id="result" class="readout" role="status" aria-live="polite"></div>
</div>

<script src="/static/app.js"></script>
</body>
</html>
