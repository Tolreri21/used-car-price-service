name: CI/CD

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  ruff-linter:
    runs-on: ubuntu-latest
    steps:
      - name: download repo
        uses: actions/checkout@v4

      - name: download python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: 'pip'

      - name: download ruff
        run: pip install ruff

      - name: check code quality
        run: ruff check .


  tests:
    needs: ruff-linter
    runs-on: ubuntu-latest
    steps:
      - name: download repo
        uses: actions/checkout@v4

      - name: download python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: 'pip'
      - name: install uv
        run: pip install uv

      - name: install project dependencies
        run: uv sync

      - name: run tests
        env:
          DATABASE_URL: postgresql://user:pass@localhost:5432/test
        run: uv run pytest

  build-and-push:
    needs: [ruff-linter, tests]
    runs-on: ubuntu-latest
    steps:
      - name: download repo
        uses: actions/checkout@v4

      - name: login
        uses: docker/login-action@v3
        with:
          username: ${{secrets.DOCKERHUB_USERNAME}}
          password: ${{secrets.DOCKERHUB_TOKEN}}

      - name: build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: tolreri21/carpy:latest

  deploy:
    needs: [build-and-push]
    runs-on: ubuntu-latest
    steps:
      - name: deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{secrets.EC2_HOST}}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker compose pull
            docker compose up -d